<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | Standard Corp.</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- フォームのスタイルは common の css/style.css に統合しました -->
</head>
<body>

    <header class="common-header">
        <div class="container">
            <h1>お問い合わせ</h1>
        </div>
    </header>

    <main class="container py-5">
        <div class="form-box">
            <!-- ★ 要変更: action を FormspreeやGoogleフォーム等のURLに変更してください -->
            <form action="https://formspree.io/f/your-form-id" method="POST">
                <div class="form-group">
                    <label class="form-label" for="name">お名前<span class="required-badge">必須</span></label>
                    <input type="text" id="name" name="name" class="form-control" placeholder="例：山田 太郎" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">メールアドレス<span class="required-badge">必須</span></label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="例：info@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="subject">お問い合わせ種別</label>
                    <select id="subject" name="subject" class="form-control">
                        <option>サービスに関するお問い合わせ</option>
                        <option>料金・お支払いについて</option>
                        <option>その他</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="message">お問い合わせ内容<span class="required-badge">必須</span></label>
                    <textarea id="message" name="message" class="form-control" placeholder="ご質問内容をご記入ください" required></textarea>
                </div>

                <button type="submit" class="btn-submit">送信する</button>
            </form>
        </div>

        <div class="back-btn-area">
            <button onclick="history.back()" class="btn-back">前のページに戻る</button>
        </div>
    </main>

    <footer class="common-footer">
        <small>&copy; Standard Corp. All Rights Reserved.</small>
    </footer>

</body>
</html>
